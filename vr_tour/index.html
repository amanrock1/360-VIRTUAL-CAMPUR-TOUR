<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus VR - Zero Delay Sync</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      .split-container {
        display: flex;
        width: 100%;
        height: 100dvh; /* dvh fixes mobile bottom bar clipping */
        position: relative;
      }
      .view-wrapper {
        width: 50%;
        height: 100%;
        position: relative;
        overflow: hidden;
      }
      .view {
        width: 100%;
        height: 100%;
      }

      .ui-overlay {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 5px;
        background: rgba(0, 0, 0, 0.6);
        padding: 10px;
        border-radius: 10px;
      }
      .ui-overlay button {
        background: #fff;
        border: none;
        padding: 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        min-width: 40px;
      }
      .exit-vr {
        background: #e74c3c !important;
        color: white;
        min-width: 70px !important;
      }

      /* Mobile styling repairs for VR Overlay */
      @media (max-width: 768px) {
        .ui-overlay {
          bottom: 50px;
          padding: 8px;
          gap: 2px;
          flex-wrap: wrap;
          justify-content: center;
          width: 90%;
        }
        .ui-overlay button {
          padding: 6px;
          font-size: 14px;
          min-width: 30px;
        }
        .exit-vr {
          min-width: 50px !important;
        }
      }

      .center-divider {
        position: absolute;
        left: 50%;
        top: 0;
        width: 2px;
        height: 100%;
        background: #000;
        z-index: 500;
      }

      .chroma-vr {
        position: absolute;
        bottom: 0px;
        right: 0px;
        z-index: 500;
        max-width: 45%;
        max-height: 50%;
        object-fit: contain;
        pointer-events: none;
        display: none;
      }
    </style>
    <link rel="stylesheet" href="../tour-project/style1.css" />
  </head>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.querySelector(".menu-btn");
        sidebar.classList.toggle("active");
        if (sidebar.classList.contains("active")) {
          menuBtn.style.display = "none";
        } else {
          menuBtn.style.display = "block";
        }
      }

      function loadScene(sceneId) {
        if (typeof viewerLeft !== "undefined") {
          viewerLeft.loadScene(sceneId);
        }
      }
    </script>

      function initViewers() {
        // Fix navigation orientation automatically for VR
        for (let sceneKey in sceneConfig.scenes) {
          let scene = sceneConfig.scenes[sceneKey];
          if (scene.hotSpots) {
            for (let hs of scene.hotSpots) {
              if (hs.type === "scene" && hs.sceneId) {
                let targetScene = sceneConfig.scenes[hs.sceneId];
                if (targetScene && targetScene.hotSpots) {
                  let rev = targetScene.hotSpots.find(
                    (s) => s.type === "scene" && s.sceneId === sceneKey,
                  );
                  if (
                    rev &&
                    rev.yaw !== undefined &&
                    hs.targetYaw === undefined
                  ) {
                    let y = rev.yaw + 180;
                    while (y > 180) y -= 360;
                    while (y <= -180) y += 360;
                    hs.targetYaw = y;
                  }
                }
              }
            }
          }
        }

        // THE FIX: Deep clone the config so the viewers don't fight over the same DOM elements
        const configLeft = JSON.parse(JSON.stringify(sceneConfig));
        const configRight = JSON.parse(JSON.stringify(sceneConfig));

        viewerLeft = pannellum.viewer("viewLeft", configLeft);
        viewerRight = pannellum.viewer("viewRight", configRight);

        let isChangingScene = false;

        // SYNC LOOP
        function syncLoop() {
          if (
            viewerLeft &&
            viewerRight &&
            viewerLeft.getScene() === viewerRight.getScene() &&
            !isChangingScene
          ) {
            let yL = viewerLeft.getYaw(),
              pL = viewerLeft.getPitch(),
              hL = viewerLeft.getHfov();
            let yR = viewerRight.getYaw(),
              pR = viewerRight.getPitch(),
              hR = viewerRight.getHfov();

            if (activeViewer === "left" && !isNaN(yL) && !isNaN(pL)) {
              viewerRight.setYaw(yL, false);
              viewerRight.setPitch(pL, false);
              viewerRight.setHfov(hL, false);
            } else if (activeViewer === "right" && !isNaN(yR) && !isNaN(pR)) {
              viewerLeft.setYaw(yR, false);
              viewerLeft.setPitch(pR, false);
              viewerLeft.setHfov(hR, false);
            }
          }
          requestAnimationFrame(syncLoop);
        }

        // Set Active Viewer
        const updateActive = (side) => {
          activeViewer = side;
        };

        // Ensure both mouse and touch are handled safely
        document
          .getElementById("viewLeft")
          .addEventListener("mousedown", () => updateActive("left"));
        document
          .getElementById("viewLeft")
          .addEventListener("touchstart", () => updateActive("left"));

        document
          .getElementById("viewRight")
          .addEventListener("mousedown", () => updateActive("right"));
        document
          .getElementById("viewRight")
          .addEventListener("touchstart", () => updateActive("right"));

        // Sync Scene Changes
        viewerLeft.on("scenechange", (id) => {
          if (isChangingScene) return;
          if (viewerRight.getScene() !== id) {
            isChangingScene = true;
            // Just load the scene, let Pannellum use the default yaw/pitch from config
            viewerRight.loadScene(id);
            setTimeout(() => {
              isChangingScene = false;
            }, 300);
          }
        });

        viewerRight.on("scenechange", (id) => {
          if (isChangingScene) return;
          if (viewerLeft.getScene() !== id) {
            isChangingScene = true;
            // Just load the scene, let Pannellum use the default yaw/pitch from config
            viewerLeft.loadScene(id);
            setTimeout(() => {
              isChangingScene = false;
            }, 300);
          }
        });

        // Start the loop
        requestAnimationFrame(syncLoop);
      }

      function pan(dir) {
        let y = viewerLeft.getYaw();
        let p = viewerLeft.getPitch();
        if (dir === "left") y -= 15;
        if (dir === "right") y += 15;
        if (dir === "up") p += 15;
        if (dir === "down") p -= 15;
        viewerLeft.setYaw(y);
        viewerRight.setYaw(y);
        viewerLeft.setPitch(p);
        viewerRight.setPitch(p);
      }

      function zoomIn() {
        let f = viewerLeft.getHfov() - 10;
        viewerLeft.setHfov(f);
        viewerRight.setHfov(f);
      }
      function zoomOut() {
        let f = viewerLeft.getHfov() + 10;
        viewerLeft.setHfov(f);
        viewerRight.setHfov(f);
      }

      initViewers();

      // ============================================
      // VR DUAL CHROMA KEY VIDEO PIPELINE
      // ============================================

      const videoElement = document.getElementById("videoElement");
      const amanVideo = document.getElementById("amanVideo");
      const mphVideo = document.getElementById("mphVideo");
      const lcVideo = document.getElementById("lcVideo");
      const ab2Video = document.getElementById("ab2Video");

      const canvasLeft = document.getElementById("chromaKeyCanvasLeft");
      const canvasRight = document.getElementById("chromaKeyCanvasRight");
      const ctxLeft = canvasLeft.getContext("2d", { willReadFrequently: true });
      const ctxRight = canvasRight.getContext("2d", {
        willReadFrequently: true,
      });

      let hasExit1PlayedOnce = false;
      let hasAmanPlayedOnce = false;
      let hasMphPlayedOnce = false;
      let hasLcPlayedOnce = false;
      let hasAb2PlayedOnce = false;

      let activeVideo = null;
      let videoPlaying = false;

      const allVideos = [videoElement, amanVideo, mphVideo, lcVideo, ab2Video];
      allVideos.forEach((v) =>
        v.addEventListener("loadedmetadata", updateCanvasSize),
      );

      function setOptimalCanvasSize() {
        if (!activeVideo || !activeVideo.videoWidth) return;

        let vw = activeVideo.videoWidth;
        let vh = activeVideo.videoHeight;
        const MAX_WIDTH = 640;

        if (vw > MAX_WIDTH) {
          const scale = MAX_WIDTH / vw;
          vw = MAX_WIDTH;
          vh = Math.floor(vh * scale);
        }

        canvasLeft.width = vw;
        canvasLeft.height = vh;
        canvasRight.width = vw;
        canvasRight.height = vh;
      }

      function updateCanvasSize(e) {
        if (activeVideo && activeVideo === e.target) {
          setOptimalCanvasSize();
        }
      }

      const amanScenes = [
        "ab back gate 1",
        "ab back gate 2",
        "ab back gate 3",
        "ab front gate 1",
        "ab front gate 2",
      ];
      const mphScenes = ["mph 1", "mph 2", "mph 3", "mph 4", "lion park"];
      const lcScenes = [
        "lc 1",
        "lc 2",
        "lc 3",
        "lc 4",
        "lc 5",
        "arch 1",
        "arch 2",
      ];
      const ab2Scenes = [
        "ab2  2",
        "ab2  3",
        "ab2  4",
        "ab2  5",
        "ab2  6",
        "ab2  7",
        "ab2  8",
        "ab 2 gate 9",
      ];

      function playVideoIfReady() {
        const currentScene = viewerLeft.getScene();

        let targetVideo = null;
        let shouldPlay = false;

        if (currentScene === "exit 1" && !hasExit1PlayedOnce) {
          targetVideo = videoElement;
          shouldPlay = true;
        } else if (amanScenes.includes(currentScene) && !hasAmanPlayedOnce) {
          targetVideo = amanVideo;
          shouldPlay = true;
        } else if (mphScenes.includes(currentScene) && !hasMphPlayedOnce) {
          targetVideo = mphVideo;
          shouldPlay = true;
        } else if (lcScenes.includes(currentScene) && !hasLcPlayedOnce) {
          targetVideo = lcVideo;
          shouldPlay = true;
        } else if (ab2Scenes.includes(currentScene) && !hasAb2PlayedOnce) {
          targetVideo = ab2Video;
          shouldPlay = true;
        }

        if (shouldPlay && targetVideo) {
          activeVideo = targetVideo;
          setOptimalCanvasSize();

          canvasLeft.style.display = "block";
          canvasRight.style.display = "block";

          const playPromise = activeVideo.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                if (activeVideo === videoElement) hasExit1PlayedOnce = true;
                if (activeVideo === amanVideo) hasAmanPlayedOnce = true;
                if (activeVideo === mphVideo) hasMphPlayedOnce = true;
                if (activeVideo === lcVideo) hasLcPlayedOnce = true;
                if (activeVideo === ab2Video) hasAb2PlayedOnce = true;
                videoPlaying = true;
                startChromaKeyRendering();
              })
              .catch((e) => {
                console.warn("Waiting for user interaction to unblock audio");
                const startOnInteract = () => {
                  if (activeVideo && viewerLeft.getScene() === currentScene) {
                    activeVideo
                      .play()
                      .then(() => {
                        if (activeVideo === videoElement)
                          hasExit1PlayedOnce = true;
                        if (activeVideo === amanVideo) hasAmanPlayedOnce = true;
                        if (activeVideo === mphVideo) hasMphPlayedOnce = true;
                        if (activeVideo === lcVideo) hasLcPlayedOnce = true;
                        if (activeVideo === ab2Video) hasAb2PlayedOnce = true;
                        videoPlaying = true;
                        startChromaKeyRendering();
                      })
                      .catch((err) => console.error(err));
                  }
                  document.removeEventListener("click", startOnInteract);
                };
                document.addEventListener("click", startOnInteract);
              });
          }
        }
      }

      // Connect to VR viewer state
      function evaluateVideoState() {
        const currentScene = viewerLeft.getScene();
        const inExit1 = currentScene === "exit 1";
        const inAmanScene = amanScenes.includes(currentScene);
        const inMphScene = mphScenes.includes(currentScene);
        const inLcScene = lcScenes.includes(currentScene);
        const inAb2Scene = ab2Scenes.includes(currentScene);

        if (activeVideo) {
          const videoDoesNotBelong =
            (activeVideo === videoElement && !inExit1) ||
            (activeVideo === amanVideo && !inAmanScene) ||
            (activeVideo === mphVideo && !inMphScene) ||
            (activeVideo === lcVideo && !inLcScene) ||
            (activeVideo === ab2Video && !inAb2Scene);

          if (videoDoesNotBelong) {
            activeVideo.pause();
            activeVideo.currentTime = 0;
            activeVideo = null;
            videoPlaying = false;
            canvasLeft.style.display = "none";
            canvasRight.style.display = "none";
          }
        }
        playVideoIfReady();
      }

      viewerLeft.on("scenechange", evaluateVideoState);
      viewerLeft.on("load", playVideoIfReady);
      setTimeout(playVideoIfReady, 500);

      function startChromaKeyRendering() {
        function renderFrame() {
          if (
            !videoPlaying ||
            !activeVideo ||
            activeVideo.paused ||
            activeVideo.ended
          ) {
            if (activeVideo && activeVideo.ended) {
              canvasLeft.style.display = "none";
              canvasRight.style.display = "none";
              activeVideo = null;
            }
            return;
          }

          const cropX = 10;
          const cropY = 15;
          const drawWidth = activeVideo.videoWidth - cropX * 2;
          const drawHeight = activeVideo.videoHeight - cropY * 2;
          const cw = canvasLeft.width;
          const ch = canvasLeft.height;

          if (drawWidth > 0 && drawHeight > 0) {
            ctxLeft.clearRect(0, 0, cw, ch);
            ctxLeft.drawImage(
              activeVideo,
              cropX,
              cropY,
              drawWidth,
              drawHeight,
              0,
              0,
              cw,
              ch,
            );
          } else {
            ctxLeft.drawImage(activeVideo, 0, 0, cw, ch);
          }

          const imageData = ctxLeft.getImageData(0, 0, cw, ch);
          const data = imageData.data;

          for (let i = 0; i < data.length; i += 4) {
            const r = data[i],
              g = data[i + 1],
              b = data[i + 2];
            const maxRB = Math.max(r, b);
            if (g > maxRB + 20 && g > 70) {
              const dominance = g - maxRB;
              if (dominance > 45) {
                data[i + 3] = 0;
              } else {
                data[i + 3] = Math.max(
                  0,
                  parseInt(255 - (dominance - 20) * 10),
                );
              }
            }
          }

          // Push the perfectly removed green screen to BOTH eyes simultaneously!
          ctxLeft.putImageData(imageData, 0, 0);

          // Copy directly over to the right view for stereo effect
          ctxRight.clearRect(0, 0, cw, ch);
          ctxRight.drawImage(canvasLeft, 0, 0);

          requestAnimationFrame(renderFrame);
        }
        requestAnimationFrame(renderFrame);
      }

      allVideos.forEach((v) => {
        v.addEventListener("ended", function () {
          if (activeVideo === this) {
            canvasLeft.style.display = "none";
            canvasRight.style.display = "none";
            videoPlaying = false;
            activeVideo = null;
          }
        });
      });
    </script>
  </body>
</html>
