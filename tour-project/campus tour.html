    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const menuBtn = document.querySelector(".menu-btn");

        sidebar.classList.toggle("active");

        if (sidebar.classList.contains("active")) {
          menuBtn.style.display = "none";
        } else {
          menuBtn.style.display = "block";
        }
      }

      // wrapper to call pannellum viewer
      function loadScene(sceneId) {
        viewer.loadScene(sceneId);
      }
    </script>

            if (hs.type === "scene" && hs.sceneId) {
              let targetScene = tourConfig.scenes[hs.sceneId];
              if (targetScene && targetScene.hotSpots) {
                let rev = targetScene.hotSpots.find(
                  (s) => s.type === "scene" && s.sceneId === sceneKey,
                );
                if (
                  rev &&
                  rev.yaw !== undefined &&
                  hs.targetYaw === undefined
                ) {
                  let y = rev.yaw + 180;
                  while (y > 180) y -= 360;
                  while (y <= -180) y += 360;
                  hs.targetYaw = y;

              }

      var viewer = pannellum.viewer("panorama", tourConfig);

      // CHROMA KEY VIDEO EFFECT
      const videoElement = document.getElementById("videoElement");
      const amanVideo = document.getElementById("amanVideo");
      const mphVideo = document.getElementById("mphVideo");
      const lcVideo = document.getElementById("lcVideo");
      const ab2Video = document.getElementById("ab2Video");
      const chromaCanvas = document.getElementById("chromaKeyCanvas");
      const ctx = chromaCanvas.getContext("2d", { willReadFrequently: true });

      let hasExit1PlayedOnce = false;
      let hasAmanPlayedOnce = false;
      let hasMphPlayedOnce = false;
      let hasLcPlayedOnce = false;
      let hasAb2PlayedOnce = false;

      let activeVideo = null;
      let videoPlaying = false;

      videoElement.addEventListener("loadedmetadata", updateCanvasSize);
      amanVideo.addEventListener("loadedmetadata", updateCanvasSize);
      mphVideo.addEventListener("loadedmetadata", updateCanvasSize);
      lcVideo.addEventListener("loadedmetadata", updateCanvasSize);
      ab2Video.addEventListener("loadedmetadata", updateCanvasSize);

      function setOptimalCanvasSize() {
        if (!activeVideo || !activeVideo.videoWidth) return;

        let vw = activeVideo.videoWidth;
        let vh = activeVideo.videoHeight;
        const MAX_WIDTH = 640; // Cap resolution for chroma key performance

        if (vw > MAX_WIDTH) {
          const scale = MAX_WIDTH / vw;
          vw = MAX_WIDTH;
          vh = Math.floor(vh * scale);
        }

        chromaCanvas.width = vw;
        chromaCanvas.height = vh;
      }

      function updateCanvasSize(e) {
        if (activeVideo && activeVideo === e.target) {
          setOptimalCanvasSize();
        }
      }

      const amanScenes = [
        "ab back gate 1",
        "ab back gate 2",
        "ab back gate 3",
        "ab front gate 1",
        "ab front gate 2",
      ];

      const mphScenes = ["mph 1", "mph 2", "mph 3", "mph 4", "lion park"];

      const lcScenes = [
        "lc 1",
        "lc 2",
        "lc 3",
        "lc 4",
        "lc 5",
        "arch 1",
        "arch 2",
      ];

      const ab2Scenes = [
        "ab2  2",
        "ab2  3",
        "ab2  4",
        "ab2  5",
        "ab2  6",
        "ab2  7",
        "ab2  8",
        "ab 2 gate 9",
      ];

      function playVideoIfReady() {
        const currentScene = viewer.getScene();

        let targetVideo = null;
        let shouldPlay = false;

        if (currentScene === "exit 1" && !hasExit1PlayedOnce) {
          targetVideo = videoElement;
          shouldPlay = true;
        } else if (amanScenes.includes(currentScene) && !hasAmanPlayedOnce) {
          targetVideo = amanVideo;
          shouldPlay = true;
        } else if (mphScenes.includes(currentScene) && !hasMphPlayedOnce) {
          targetVideo = mphVideo;
          shouldPlay = true;
        } else if (lcScenes.includes(currentScene) && !hasLcPlayedOnce) {
          targetVideo = lcVideo;
          shouldPlay = true;
        } else if (ab2Scenes.includes(currentScene) && !hasAb2PlayedOnce) {
          targetVideo = ab2Video;
          shouldPlay = true;
        }

        if (shouldPlay && targetVideo) {
          activeVideo = targetVideo;
          // Always ensure optimal size before playing to prevent extreme lag
          setOptimalCanvasSize();

          chromaCanvas.style.display = "block";
          const playPromise = activeVideo.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                if (activeVideo === videoElement) hasExit1PlayedOnce = true;
                if (activeVideo === amanVideo) hasAmanPlayedOnce = true;
                if (activeVideo === mphVideo) hasMphPlayedOnce = true;
                if (activeVideo === lcVideo) hasLcPlayedOnce = true;
                if (activeVideo === ab2Video) hasAb2PlayedOnce = true;
                videoPlaying = true;
                startChromaKeyRendering();
              })
              .catch((e) => {
                console.warn(
                  "Autoplay with audio blocked. Waiting for user interaction to play video.",
                );
                const startOnInteract = () => {
                  if (activeVideo && viewer.getScene() === currentScene) {
                    activeVideo
                      .play()
                      .then(() => {
                        if (activeVideo === videoElement)
                          hasExit1PlayedOnce = true;
                        if (activeVideo === amanVideo) hasAmanPlayedOnce = true;
                        if (activeVideo === mphVideo) hasMphPlayedOnce = true;
                        if (activeVideo === lcVideo) hasLcPlayedOnce = true;
                        if (activeVideo === ab2Video) hasAb2PlayedOnce = true;
                        videoPlaying = true;
                        startChromaKeyRendering();
                      })
                      .catch((err) => console.error(err));
                  }
                  document.removeEventListener("click", startOnInteract);
                  document.removeEventListener("touchstart", startOnInteract);
                };
                document.addEventListener("click", startOnInteract);
                document.addEventListener("touchstart", startOnInteract);
              });
          } else {
            if (activeVideo === videoElement) hasExit1PlayedOnce = true;
            if (activeVideo === amanVideo) hasAmanPlayedOnce = true;
            if (activeVideo === mphVideo) hasMphPlayedOnce = true;
            if (activeVideo === lcVideo) hasLcPlayedOnce = true;
            if (activeVideo === ab2Video) hasAb2PlayedOnce = true;
            videoPlaying = true;
            startChromaKeyRendering();
          }
        }
      }

      // Listen for scene change to trigger video play or stop
      viewer.on("scenechange", function (e) {
        const currentScene = viewer.getScene();
        const inExit1 = currentScene === "exit 1";
        const inAmanScene = amanScenes.includes(currentScene);
        const inMphScene = mphScenes.includes(currentScene);
        const inLcScene = lcScenes.includes(currentScene);
        const inAb2Scene = ab2Scenes.includes(currentScene);

        // Stop active video if it doesn't belong to the current scene
        if (activeVideo) {
          const videoDoesNotBelong =
            (activeVideo === videoElement && !inExit1) ||
            (activeVideo === amanVideo && !inAmanScene) ||
            (activeVideo === mphVideo && !inMphScene) ||
            (activeVideo === lcVideo && !inLcScene) ||
            (activeVideo === ab2Video && !inAb2Scene);

          if (videoDoesNotBelong) {
            activeVideo.pause();
            activeVideo.currentTime = 0; // optional: reset to start
            activeVideo = null;
            videoPlaying = false;
            chromaCanvas.style.display = "none";
          }
        }

        playVideoIfReady();
      });

      viewer.on("load", playVideoIfReady);
      setTimeout(playVideoIfReady, 500);

      function startChromaKeyRendering() {
        function renderFrame() {
          if (
            !videoPlaying ||
            !activeVideo ||
            activeVideo.paused ||
            activeVideo.ended
          ) {
            if (activeVideo && activeVideo.ended) {
              chromaCanvas.style.display = "none";
              activeVideo = null;
            }
            return;
          }

          // Crop a few pixels from the top/bottom/sides to remove any baked-in video borders or letterboxing
          const cropX = 10;
          const cropY = 15;
          const drawWidth = activeVideo.videoWidth - cropX * 2;
          const drawHeight = activeVideo.videoHeight - cropY * 2;

          if (drawWidth > 0 && drawHeight > 0) {
            ctx.clearRect(0, 0, chromaCanvas.width, chromaCanvas.height);
            ctx.drawImage(
              activeVideo,
              cropX,
              cropY,
              drawWidth,
              drawHeight,
              0,
              0,
              chromaCanvas.width,
              chromaCanvas.height,
            );
          } else {
            ctx.drawImage(
              activeVideo,
              0,
              0,
              chromaCanvas.width,
              chromaCanvas.height,
            );
          }

          const imageData = ctx.getImageData(
            0,
            0,
            chromaCanvas.width,
            chromaCanvas.height,
          );
          const data = imageData.data;

          // Apply chroma key - make green transparent
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];

            const maxRB = Math.max(r, b);
            if (g > maxRB + 20 && g > 70) {
              const dominance = g - maxRB;
              if (dominance > 45) {
                data[i + 3] = 0; // Fully transparent
              } else {
                // Partial transparency for edge smoothing
                data[i + 3] = Math.max(
                  0,
                  parseInt(255 - (dominance - 20) * 10),
                );
              }
            }
          }

          ctx.putImageData(imageData, 0, 0);

          requestAnimationFrame(renderFrame);
        }

        requestAnimationFrame(renderFrame);
      }

      videoElement.addEventListener("ended", function () {
        if (activeVideo === videoElement) {
          chromaCanvas.style.display = "none";
          videoPlaying = false;
          activeVideo = null;
        }
      });

      amanVideo.addEventListener("ended", function () {
        if (activeVideo === amanVideo) {
          chromaCanvas.style.display = "none";
          videoPlaying = false;
          activeVideo = null;
        }
      });

      mphVideo.addEventListener("ended", function () {
        if (activeVideo === mphVideo) {
          chromaCanvas.style.display = "none";
          videoPlaying = false;
          activeVideo = null;
        }
      });

      lcVideo.addEventListener("ended", function () {
        if (activeVideo === lcVideo) {
          chromaCanvas.style.display = "none";
          videoPlaying = false;
          activeVideo = null;
        }
      });

      ab2Video.addEventListener("ended", function () {
        if (activeVideo === ab2Video) {
          chromaCanvas.style.display = "none";
          videoPlaying = false;
          activeVideo = null;
        }
      });

      // END CHROMA KEY VIDEO EFFECT

      // Stop drag if mouse leaves
      canvas.addEventListener("mouseleave", () => {
        isDragging = false;
      });
    </script>
    <script src="script.js"></script>
